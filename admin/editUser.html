	<script>
		adminDebug=true;
        var editUserId=getQueryVariable('editUserId');
		Cookies.set("editUserId",editUserId, { expires: 365 });
        function pageLoaded(){
            admin.verifyAdminSession();
            getUser(editUserId);



        }

        

        function getUser(editUserId){
            admin.getUser(admin.sessionId,editUserId, function(responseJSON){
                response=JSON.parse(responseJSON);
                
				document.getElementById("editUserId").value=response[0].userId;
				document.getElementById("firstName").value=response[0].firstName;
				document.getElementById("lastName").value=response[0].lastName;
				document.getElementById("email").value=response[0].email;
				document.getElementById("phone").value=response[0].phone;
				document.getElementById("password").value=response[0].password;
            });
        }

		function updateUser(){
            var action="updateTrader";
            
		  	var editUserId=document.getElementById('editUserId').value
			var firstName=document.getElementById('firstName').value
			var lastName=document.getElementById('lastName').value
			var phone=document.getElementById('phone').value
			var email=document.getElementById('email').value
			var password=document.getElementById('password').value
			
			admin.updateUser(admin.sessionId,editUserId,firstName,lastName,email,phone,password, function(responseJSON){
                response=JSON.parse(responseJSON);
				document.getElementById("message").innerHTML="User data has been saved";
			});
		}

		
	</script>
