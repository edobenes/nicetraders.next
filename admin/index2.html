	<script>

		if (window.location.hostname == "localhost" || window.location.hostname == "127.0.0.1"){
			var basePath=window.location.protocol + "//" + window.location.host +":3000/";
			var socketPath="ws://" + window.location.host +":3000/q";
		} else if (window.location.hostname=="www.fridgealive.com" || window.location.hostname=="fridgealive.com"){
			var socketPath="wss://" + window.location.host +"/q/";
			var basePath=window.location.protocol + "//" + window.location.host +"/q/";
		}


		adminDebug=true;
		function pageLoaded(){
			
			connectToWebSockets();
			
			//admin.verifyAdminSession();
			//getUsers("");
		}


		var connection;
	function connectToWebSockets(){
		//console.log("connectToWebSockets", socketPath)
		connection = new WebSocket(socketPath);
		connection.onopen = function(){
			//console.log('connected 1, setting heartbeat');
			admin.verifyAdminSession();
		};

		connection.onclose = function() {
			console.error('disconnected');
			setTimeout(connectToWebSockets,10000);
		};

		connection.onerror = function(error) {
			console.error('failed to connect', error);
		};

		connection.onmessage = function(event){
			var command;
			if (event.data){
				try{
					command=JSON.parse(event.data);
					//console.log(command);
				} catch(err){
					//console.log("error",event,err);
					return;
				}
			} else{
				//console.log("error",event,err);
				return;
			}
			if (command.object && command.method && command.data){
				//console.log("command",command);
				try{
					objects[command.object][command.method](command.data,
						function(success){
							if (success.object && success.method && success.data){
							//console.log("GO!");
								objects[success.object][success.method](success.data);
							}
						}
						,
						function(response){
							//console.log("failure",response);

						}
						
					);
				}
				catch(err){
					console.error("error",err);
				}
			} else{
				//console.log("error",command);

			}
			


			
		};

	

	}


		
	</script>
