<script>
	
	function login(){

            
			var email=document.getElementById('email').value;
            var password=document.getElementById('password').value;

            
           

            admin.login(email,password,
                function(response){
                    var session=JSON.parse(response);
                    
                    if (session.sessionId){
                        Cookies.set("sessionId",session.sessionId, { expires: 365 });
                        errorMessage("Looks good");
                        location.href="index.html";
                    } else{
                        Cookies.remove('sessionId');
                        errorMessage("The email and password is wrong");
                    }
                },
                function(response){
                    errorMessage("An timeout error occurred with the server, try again.");
                }
            );
            
            

        }
        
	

	function errorMessage(msg){
		document.getElementById("errorMsg").innerHTML=msg; 
	}
	function clearError(){
		document.getElementById("errorMsg").innerHTML="";
	}
</script>

		<div class="card overflow-hidden z-index-1">
