<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="NICE Traders — Peer-to-peer neighborhood currency exchange. Trade safely with people near you.">
  <meta name="keywords" content="currency exchange, peer to peer, neighborhood, forex, travel money, NICE Traders">
  <meta name="author" content="NICE Traders">
  <meta name="theme-color" content="#1a56db">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NiceTraders">
  <meta name="msapplication-TileColor" content="#1a56db">
  <meta name="msapplication-TileImage" content="/img/favicons/mstile-150x150.png">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="NICE Traders — Neighborhood Currency Exchange">
  <meta property="og:description" content="Exchange foreign currency safely with neighbors. No bank fees, just fair rates between real people.">
  <meta property="og:image" content="/img/NICE-TRADERS-LOGO.png">

  <title>NICE Traders</title>

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="/img/favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicons/favicon-16x16.png">
  <link rel="shortcut icon" href="/img/favicons/favicon.ico">
  <link rel="manifest" href="/app-manifest.json">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- App styles -->
  <link rel="stylesheet" href="/css/app.css">

  <!-- Prevent FOUC on auth screens -->
  <style>
    #app-main { visibility: hidden; }
    body.ready #app-main { visibility: visible; }
    .app-loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #0a0f1e, #1a3a7a);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; transition: opacity .4s ease;
    }
    .app-loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .app-loading-logo { font-size: 1.6rem; font-weight: 900; color: white; letter-spacing: -.04em; }
    .app-loading-bar {
      width: 160px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,.15); overflow: hidden;
    }
    .app-loading-bar-inner {
      height: 100%; width: 0; background: linear-gradient(90deg, #3b82f6, #34d399);
      border-radius: 2px; animation: loadBar 1.2s ease forwards;
    }
    @keyframes loadBar { to { width: 100%; } }
  </style>
</head>
<body>

<!-- ── Loading splash ───────────────────────────────────── -->
<div class="app-loading-screen" id="loading-screen">
  <div style="font-size:2.5rem;margin-bottom:8px;">💱</div>
  <div class="app-loading-logo">NICE Traders</div>
  <div class="app-loading-bar"><div class="app-loading-bar-inner"></div></div>
  <div style="font-size:.75rem;color:rgba(255,255,255,.4);font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-top:4px;">Loading…</div>
</div>

<!-- ── App shell ────────────────────────────────────────── -->
<div id="app-shell">

  <!-- ── Top header (shown only when logged in) ──────────── -->
  <header id="app-header" style="display:none;">
    <!-- Logo -->
    <div class="header-logo" onclick="Router.go('dashboard')" style="cursor:pointer;">
      <img src="/img/NICE-TRADERS-LOGO.png" alt="NICE Traders" onerror="this.style.display='none'">
      <span class="wordmark">NICE Traders</span>
    </div>

    <!-- Logged-in nav actions -->
    <div class="header-actions" id="header-app-nav" style="display:none;">
      <button class="header-btn" onclick="Router.go('notifications')" title="Notifications">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge" id="notif-badge" style="display:none;"></span>
      </button>
      <div class="header-avatar" onclick="Router.go('profile')" style="cursor:pointer;" title="Profile">
        <span class="user-avatar-text">?</span>
      </div>
    </div>

    <!-- Logged-out header nav -->
    <div class="header-actions" id="header-auth-nav" style="display:flex;">
      <button class="btn btn-outline btn-sm" onclick="Router.go('login')">Sign in</button>
      <button class="btn btn-primary btn-sm" onclick="Router.go('register')">Get started</button>
    </div>
  </header>

  <!-- ── Side nav (desktop, visible md+) ─────────────────── -->
  <nav id="side-nav" style="display:none;">
    <div class="side-nav-item" data-screen="dashboard" onclick="Router.go('dashboard')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard
    </div>

    <div class="side-nav-fab">
      <button class="btn btn-primary btn-full" onclick="Router.go('trade')">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        New Trade
      </button>
    </div>

    <div class="side-nav-item" data-screen="messages" onclick="Router.go('messages')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
      <span class="nav-count" id="side-msg-count" style="display:none;">1</span>
    </div>

    <div class="side-nav-item" data-screen="referrals" onclick="Router.go('referrals')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      Referrals
    </div>

    <div class="side-nav-section">Account</div>

    <div class="side-nav-item" data-screen="profile" onclick="Router.go('profile')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile & Settings
    </div>

    <div class="side-nav-item" data-screen="notifications" onclick="Router.go('notifications')">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Notifications
      <span class="nav-count" id="side-notif-count" style="display:none;">2</span>
    </div>

    <div style="flex:1;"></div>

    <div class="side-nav-item" onclick="Auth.logout()" style="color:var(--red-500);">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </div>
  </nav>

  <!-- ── Main content area ──────────────────────────────── -->
  <main id="app-main">
    <!-- Screens are injected here by the router -->
    <div class="loading-overlay">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- ── Bottom navigation (mobile only) ───────────────── -->
  <nav id="bottom-nav" style="display:none;">
    <div class="bnav-item" data-screen="dashboard" onclick="Router.go('dashboard')">
      <svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </div>

    <div class="bnav-item" data-screen="messages" onclick="Router.go('messages')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Messages</span>
      <span class="nav-badge" id="bnav-msg-badge" style="display:none;">1</span>
    </div>

    <!-- FAB: new trade -->
    <div class="bnav-fab">
      <button class="bnav-fab-btn" onclick="Router.go('trade')" title="New trade">
        <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <div class="bnav-item" data-screen="referrals" onclick="Router.go('referrals')">
      <svg viewBox="0 0 24 24"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>Earn</span>
    </div>

    <div class="bnav-item" data-screen="profile" onclick="Router.go('profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </div>
  </nav>

  <!-- ── Modal / Bottom sheet ───────────────────────────── -->
  <div id="modal-backdrop" class="modal-backdrop">
    <div id="modal-sheet" class="modal-sheet">
      <!-- Content injected by App.openEditProfile / App.openChangePassword etc. -->
    </div>
  </div>

</div>

<!-- ── Toast notifications ────────────────────────────────── -->
<div id="toast-container"></div>

<!-- App script -->
<script src="/js/app.js"></script>

<script>
  // Remove loading screen once app signals readiness
  window._removeLoader = function() {
    var loader = document.getElementById('loading-screen');
    if (loader) {
      loader.classList.add('fade-out');
      setTimeout(function() {
        if (loader.parentNode) loader.parentNode.removeChild(loader);
      }, 400);
    }
    document.body.classList.add('ready');
  };
</script>

</body>
</html>
